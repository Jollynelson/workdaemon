version: '3.8'

# WorkDaemon Brain — Local Infrastructure
# Run: docker-compose up -d
# Then: ollama pull nomic-embed-text && ollama pull llama3.1:70b

services:

  # ── Qdrant Vector Store ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: workdaemon-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama (nomic-embed-text + Llama 3.1 if running locally) ───────────────
  ollama:
    image: ollama/ollama:latest
    container_name: workdaemon-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support — uncomment if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Postgres (knowledge graph + behaviour graph + cache) ────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: workdaemon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: workdaemon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workdaemon
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/store/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workdaemon"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_data:
  ollama_data:
  postgres_data:
