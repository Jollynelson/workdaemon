<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorkDaemon — Dev Console</title>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --text:     #e2e4ed;
      --muted:    #7c7f94;
      --green:    #00c896;
      --green-bg: rgba(0,200,150,0.08);
      --orange:   #f59e0b;
      --red:      #ef4444;
      --blue:     #6366f1;
      --blue-bg:  rgba(99,102,241,0.1);
      --radius:   10px;
      --font:     'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .status-label { font-size: 12px; color: var(--muted); }
    .ws-status { margin-left: auto; font-size: 11px; padding: 4px 10px; border-radius: 20px; }
    .ws-status.connected { background: var(--green-bg); color: var(--green); }
    .ws-status.disconnected { background: rgba(239,68,68,0.1); color: var(--red); }

    /* ── Layout ─────────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 220px 1fr 300px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Employee sidebar ───────────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-title {
      padding: 14px 16px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }
    .employee-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
    .employee-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
    }
    .employee-item:hover { background: var(--border); }
    .employee-item.active { background: var(--blue-bg); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .emp-info { min-width: 0; }
    .emp-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .emp-role { font-size: 11px; color: var(--muted); }
    .level-badge {
      margin-left: auto; flex-shrink: 0;
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
    }
    .level-1 { background: rgba(124,127,148,0.2); color: var(--muted); }
    .level-2 { background: rgba(245,158,11,0.15); color: var(--orange); }
    .level-3 { background: rgba(0,200,150,0.15); color: var(--green); }

    /* ── Chat area ──────────────────────────────────────────── */
    .chat-area {
      display: flex; flex-direction: column; overflow: hidden;
    }
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .chat-employee-name { font-size: 15px; font-weight: 700; }
    .chat-employee-meta { font-size: 12px; color: var(--muted); }
    .daemon-indicator {
      margin-left: auto; font-size: 11px;
      padding: 4px 10px; border-radius: 20px;
      background: var(--green-bg); color: var(--green);
    }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Message bubbles ─────────────────────────────────────── */
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.daemon { align-self: flex-start; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; margin-top: 2px;
    }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--blue);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.daemon .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }
    .msg.daemon .msg-time { text-align: left; }

    /* ── Approval card ───────────────────────────────────────── */
    .approval-card {
      background: var(--surface);
      border: 1px solid var(--orange);
      border-radius: 10px;
      padding: 14px;
      max-width: 340px;
    }
    .approval-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--orange); margin-bottom: 8px;
    }
    .approval-preview {
      font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.5;
    }
    .approval-btns { display: flex; gap: 8px; }
    .btn-approve, .btn-reject {
      flex: 1; padding: 8px 14px; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none;
      transition: opacity 0.15s;
    }
    .btn-approve { background: var(--green); color: #000; }
    .btn-reject  { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid var(--red); }
    .btn-approve:hover, .btn-reject:hover { opacity: 0.85; }

    /* ── Typing indicator ────────────────────────────────────── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 8px 14px; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    /* ── Input area ──────────────────────────────────────────── */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .input-wrap { flex: 1; position: relative; }
    .msg-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      padding: 11px 14px; font-size: 14px;
      resize: none; outline: none;
      font-family: var(--font);
      transition: border-color 0.15s;
      max-height: 120px;
    }
    .msg-input:focus { border-color: var(--blue); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--green); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn svg { fill: #000; }
    .quick-actions {
      display: flex; gap: 6px; padding: 0 20px 10px; flex-wrap: wrap;
    }
    .quick-btn {
      font-size: 11px; padding: 4px 10px; border-radius: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .quick-btn:hover { border-color: var(--green); color: var(--green); }

    /* ── Activity feed ───────────────────────────────────────── */
    .activity {
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .activity-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .clear-btn {
      font-size: 10px; color: var(--muted); cursor: pointer;
      padding: 2px 6px; border-radius: 4px;
      background: transparent; border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--muted); }
    .activity-feed {
      flex: 1; overflow-y: auto;
      padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .activity-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
    }
    .activity-item.bus   { background: rgba(99,102,241,0.08); border-left: 2px solid var(--blue); }
    .activity-item.brain { background: rgba(0,200,150,0.06); border-left: 2px solid var(--green); }
    .activity-item.sys   { background: var(--surface); border-left: 2px solid var(--border); }
    .activity-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 3px;
    }
    .bus .activity-label   { color: var(--blue); }
    .brain .activity-label { color: var(--green); }
    .sys .activity-label   { color: var(--muted); }
    .activity-text { color: var(--text); }
    .activity-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--muted);
    }
    .empty-state .icon { font-size: 32px; }
    .empty-state p { font-size: 13px; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">Work<span>Daemon</span></div>
  <div class="status-dot"></div>
  <div class="status-label">Dev Console</div>
  <div id="ws-status" class="ws-status disconnected">⚡ Connecting...</div>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Employee sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Staff</div>
    <div class="employee-list" id="employee-list">
      <div style="padding:16px;color:var(--muted);font-size:12px;">Loading...</div>
    </div>
  </div>

  <!-- Chat area -->
  <div class="chat-area">
    <div class="chat-header" id="chat-header">
      <div class="empty-state" style="flex-direction:row;gap:8px;margin:auto 0;">
        <div>👈 Select an employee to start</div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">👻</div>
        <p>Select an employee to chat with their Daemon</p>
      </div>
    </div>

    <div class="quick-actions" id="quick-actions" style="display:none"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          class="msg-input"
          id="msg-input"
          placeholder="Message your Daemon..."
          rows="1"
          disabled
        ></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="send_message()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Activity feed -->
  <div class="activity">
    <div class="activity-header">
      Live Activity
      <button class="clear-btn" onclick="clear_activity()">Clear</button>
    </div>
    <div class="activity-feed" id="activity-feed">
      <div style="color:var(--muted);font-size:12px;padding:8px;">
        Bus messages and Brain queries appear here.
      </div>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ws = null;
let current_employee = null;
let employees = [];
let chat_history = {}; // email → messages[]
let typing_timer = null;

const AVATAR_COLORS = [
  '#6366f1','#f59e0b','#00c896','#ef4444',
  '#8b5cf6','#06b6d4','#f97316','#ec4899',
];

const QUICK_ACTIONS = {
  pm:        ['Assign checkout redesign to Sarah, high priority',
               'What\'s the status of active projects?',
               'Check Sarah\'s capacity',
               'Assign login bug fix to James, urgent'],
  designer:  ['What tasks do I have?',
               'Mark checkout redesign done, push to James',
               'I\'m blocked on the design brief',
               'What did we decide about the brand colours?'],
  developer: ['What\'s in my queue?',
               'Mark login bug fix done',
               'I\'m blocked on the API spec',
               'Create a GitHub PR for the auth feature'],
  hr:        ['Send a company-wide announcement about Friday off',
               'Who joined the team recently?',
               'What\'s our onboarding process?'],
  executive: ['What are the current blockers?',
               'Summarise active projects',
               'What decisions were made this week?'],
  default:   ['What are my tasks?',
               'What did we decide about the pricing model?',
               'Who owns the checkout project?',
               'Schedule a meeting with the team tomorrow'],
};

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect_ws() {
  const WS_URL = `ws://localhost:3001`;
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById('ws-status').textContent = '✓ Connected';
    document.getElementById('ws-status').className = 'ws-status connected';
    add_activity('sys', 'System', 'Connected to WorkDaemon Gateway', {});
  };

  ws.onclose = () => {
    document.getElementById('ws-status').textContent = '✗ Disconnected';
    document.getElementById('ws-status').className = 'ws-status disconnected';
    setTimeout(connect_ws, 3000); // auto-reconnect
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    handle_ws_message(msg);
  };
}

function handle_ws_message(msg) {
  // Hide typing indicator
  hide_typing();

  switch (msg.type) {
    case 'daemon_reply':
      if (msg.meta?.kind === 'approval') {
        show_approval_card(msg.to_email, msg.meta);
      } else {
        add_message(msg.to_email, 'daemon', msg.text, msg.from);
      }
      break;

    case 'bus_event':
      add_activity('bus', 'Daemon Bus', msg.text, msg.meta ?? {});
      break;

    case 'brain_status':
      add_activity('brain', 'Brain', 
        `Query answered via ${msg.meta.model_used} ${msg.meta.cached ? '(cached)' : ''} in ${msg.meta.latency_ms}ms`,
        msg.meta
      );
      break;

    case 'system':
      add_activity('sys', 'System', msg.text, {});
      break;
  }
}

// ── Employees ─────────────────────────────────────────────────────────────────
async function load_employees() {
  try {
    const res  = await fetch('/api/employees');
    employees  = await res.json();
    render_employee_list();
  } catch {
    // Dev fallback — hardcoded demo employees
    employees = [
      { email:'nelson@acme.com',  name:'Nelson',  role:'executive', daemon_level:3 },
      { email:'amara@acme.com',   name:'Amara',   role:'pm',        daemon_level:2 },
      { email:'sarah@acme.com',   name:'Sarah',   role:'designer',  daemon_level:1 },
      { email:'james@acme.com',   name:'James',   role:'developer', daemon_level:2 },
      { email:'fatima@acme.com',  name:'Fatima',  role:'hr',        daemon_level:2 },
    ];
    render_employee_list();
  }
}

function render_employee_list() {
  const list = document.getElementById('employee-list');
  list.innerHTML = employees.map((emp, i) => `
    <div class="employee-item" onclick="select_employee('${emp.email}')" id="emp-${emp.email.replace('@','_')}">
      <div class="avatar" style="background:${AVATAR_COLORS[i % AVATAR_COLORS.length]}22;color:${AVATAR_COLORS[i % AVATAR_COLORS.length]}">
        ${emp.name[0]}
      </div>
      <div class="emp-info">
        <div class="emp-name">${emp.name}</div>
        <div class="emp-role">${emp.role}</div>
      </div>
      <div class="level-badge level-${emp.daemon_level}">L${emp.daemon_level}</div>
    </div>
  `).join('');
}

function select_employee(email) {
  current_employee = employees.find(e => e.email === email);
  if (!current_employee) return;

  // Update active state
  document.querySelectorAll('.employee-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`emp-${email.replace('@','_')}`).classList.add('active');

  // Update chat header
  const idx = employees.indexOf(current_employee);
  const color = AVATAR_COLORS[idx % AVATAR_COLORS.length];
  const level_names = { 1:'Copilot', 2:'Assistant', 3:'Autonomous' };
  document.getElementById('chat-header').innerHTML = `
    <div class="avatar" style="background:${color}22;color:${color};width:36px;height:36px;font-size:16px;">
      ${current_employee.name[0]}
    </div>
    <div>
      <div class="chat-employee-name">${current_employee.name}</div>
      <div class="chat-employee-meta">${current_employee.email} · ${current_employee.role}</div>
    </div>
    <div class="daemon-indicator">👻 ${level_names[current_employee.daemon_level] ?? 'Level '+current_employee.daemon_level}</div>
  `;

  // Identify this connection to the server
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'identify', email }));
  }

  // Restore chat history
  render_messages();

  // Enable input
  document.getElementById('msg-input').disabled = false;
  document.getElementById('msg-input').placeholder = `Message ${current_employee.name}'s Daemon...`;

  // Show quick actions
  show_quick_actions();
}

// ── Messaging ─────────────────────────────────────────────────────────────────
function send_message() {
  if (!current_employee) return;
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  // Add to UI immediately
  add_message(current_employee.email, 'user', text, current_employee.name);
  input.value = '';
  input.style.height = 'auto';

  // Show typing indicator
  show_typing();

  // Send via WebSocket
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type:  'message',
      email: current_employee.email,
      text,
    }));
  } else {
    hide_typing();
    add_message(current_employee.email, 'daemon',
      '⚠️ Not connected to Gateway. Make sure WorkDaemon is running.',
      'System'
    );
  }
}

function add_message(email, role, text, sender) {
  if (!chat_history[email]) chat_history[email] = [];
  const msg = { role, text, sender, time: new Date().toLocaleTimeString() };
  chat_history[email].push(msg);

  if (current_employee?.email === email) {
    append_message_el(msg);
  }
}

function render_messages() {
  const container = document.getElementById('messages');
  const history   = chat_history[current_employee?.email] ?? [];

  if (history.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">👻</div>
        <p>Start a conversation with ${current_employee?.name}'s Daemon</p>
      </div>`;
    return;
  }

  container.innerHTML = '';
  history.forEach(msg => append_message_el(msg));
}

function append_message_el(msg) {
  const container = document.getElementById('messages');
  // Remove empty state
  container.querySelector('.empty-state')?.remove();

  const el = document.createElement('div');
  el.className = `msg ${msg.role}`;

  const avatar = msg.role === 'user'
    ? `<div class="msg-avatar" style="background:#6366f122;color:#6366f1">${msg.sender?.[0] ?? 'U'}</div>`
    : `<div class="msg-avatar" style="background:#00c89622;font-size:16px">👻</div>`;

  el.innerHTML = `
    ${avatar}
    <div>
      <div class="msg-bubble">${escape_html(msg.text)}</div>
      <div class="msg-time">${msg.time}</div>
    </div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function show_approval_card(email, meta) {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg daemon';
  el.innerHTML = `
    <div class="msg-avatar" style="background:#f59e0b22;font-size:16px">👻</div>
    <div class="approval-card">
      <div class="approval-label">⚡ Awaiting your approval</div>
      <div class="approval-preview">${escape_html(meta.preview)}</div>
      <div class="approval-btns">
        <button class="btn-approve" onclick="send_approval('approve', '${meta.action_id}', this)">✅ Approve</button>
        <button class="btn-reject"  onclick="send_approval('reject',  '${meta.action_id}', this)">❌ Reject</button>
      </div>
    </div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function send_approval(decision, action_id, btn) {
  if (!current_employee) return;
  btn.closest('.approval-btns').querySelectorAll('button').forEach(b => b.disabled = true);
  const approved = decision === 'approve';
  add_message(current_employee.email, 'user',
    approved ? '✅ Approved' : '❌ Rejected', current_employee.name
  );
  show_typing();
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type:      'approval',
      email:     current_employee.email,
      text:      decision,
      action_id: `${decision}:${action_id}`,
    }));
  }
}

// ── Quick actions ──────────────────────────────────────────────────────────────
function show_quick_actions() {
  const role     = current_employee?.role ?? 'default';
  const actions  = QUICK_ACTIONS[role] ?? QUICK_ACTIONS.default;
  const container = document.getElementById('quick-actions');
  container.style.display = 'flex';
  container.innerHTML = actions.map(a =>
    `<button class="quick-btn" onclick="use_quick('${a.replace(/'/g,"&#39;")}')">${a}</button>`
  ).join('');
}

function use_quick(text) {
  document.getElementById('msg-input').value = text;
  send_message();
}

// ── Typing indicator ───────────────────────────────────────────────────────────
function show_typing() {
  const container = document.getElementById('messages');
  const el = document.createElement('div');
  el.className = 'msg daemon'; el.id = 'typing-indicator';
  el.innerHTML = `
    <div class="msg-avatar" style="background:#00c89622;font-size:16px">👻</div>
    <div class="msg-bubble" style="padding:8px 14px;">
      <div class="typing"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function hide_typing() {
  document.getElementById('typing-indicator')?.remove();
}

// ── Activity feed ──────────────────────────────────────────────────────────────
function add_activity(type, label, text, meta) {
  const feed = document.getElementById('activity-feed');
  feed.querySelector('div[style]')?.remove(); // remove placeholder

  const el = document.createElement('div');
  el.className = `activity-item ${type}`;
  el.innerHTML = `
    <div class="activity-label">${label}</div>
    <div class="activity-text">${escape_html(text)}</div>
    ${meta.model_used ? `<div class="activity-meta">Model: ${meta.model_used} · Tokens: ${meta.tokens_used ?? 0} · Cached: ${meta.cached ? 'yes' : 'no'}</div>` : ''}
    <div class="activity-meta">${new Date().toLocaleTimeString()}</div>
  `;
  feed.prepend(el);

  // Keep max 50 items
  while (feed.children.length > 50) feed.lastChild?.remove();
}

function clear_activity() {
  document.getElementById('activity-feed').innerHTML =
    '<div style="color:var(--muted);font-size:12px;padding:8px;">Cleared.</div>';
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escape_html(text) {
  return String(text ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
}

// ── Input auto-resize ──────────────────────────────────────────────────────────
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send_message();
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────────
connect_ws();
load_employees();
</script>
