# CI gate for the live Vercel app. Every push/PR must install, lint, test and
# build before merge — main auto-deploys to production, so this is the only
# machine between a typo and live users. (Python side tracks are not in the
# required path; add a separate job when they re-activate.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
